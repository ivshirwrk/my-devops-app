version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: my-redis
    restart: unless-stopped

  web:
    build: .
    container_name: my-web-app
    restart: unless-stopped
    environment:
      - REDIS_HOST=redis
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: my-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - web
